<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siz uchun maxsus</title>
    <style>
        body { 
            margin: 0; height: 100vh; overflow: hidden; display: flex; 
            justify-content: center; align-items: center; 
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            font-family: 'Segoe UI', sans-serif;
        }
        .card { 
            background: white; padding: 40px; border-radius: 30px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            text-align: center; max-width: 400px; width: 85%; z-index: 10;
        }
        .heart-main { color: #ff4b2b; font-size: 70px; animation: beat .3s infinite alternate; }
        @keyframes beat { to { transform: scale(1.2); } }
        
        /* Uchib yuruvchi yurakchalar uchun */
        .floating-heart {
            position: absolute; color: #ff4b2b; opacity: 0.6;
            font-size: 20px; animation: float 4s linear infinite;
        }
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="heart-main">❤️</div>
        <h1>Salom, Zar!</h1>
        <p style="color: #ff4b2b; font-size: 22px; font-weight: bold;">{{.Message}}</p>
    </div>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 2 + 3 + 's';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }
        setInterval(createHeart, 300); // Har 300ms da yangi yurakcha yaratadi
    </script>
</body>
</html>
