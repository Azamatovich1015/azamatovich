<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siz uchun maxsus xabar</title>
    <style>
        body { 
            margin: 0; height: 100vh; display: flex; 
            justify-content: center; align-items: center; 
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            font-family: 'Segoe UI', sans-serif;
        }
        .card { 
            background: white; padding: 40px; border-radius: 30px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            text-align: center; max-width: 400px; width: 85%;
        }
        .heart { color: #ff4b2b; font-size: 70px; animation: beat .3s infinite alternate; }
        @keyframes beat { to { transform: scale(1.2); } }
        h1 { color: #333; margin: 20px 0; font-size: 24px; }
        p { color: #ff4b2b; font-size: 20px; font-weight: bold; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="card">
        <div class="heart">❤️</div>
        <h1>Salom, Zar!</h1>
        <p>{{.Message}}</p>
    </div>
</body>
</html>
