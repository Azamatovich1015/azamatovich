<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siz uchun maxsus</title>
    <style>
        body { margin: 0; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); font-family: 'Segoe UI', sans-serif; cursor: pointer; }
        .card { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); text-align: center; max-width: 350px; width: 85%; z-index: 10; position: relative; }
        .heart-main { color: #ff4b2b; font-size: 70px; animation: beat .4s infinite alternate; }
        @keyframes beat { to { transform: scale(1.1); } }
        .floating-heart { position: absolute; color: #ff4b2b; opacity: 0.6; font-size: 20px; animation: float 4s linear infinite; pointer-events: none; }
        @keyframes float { 0% { transform: translateY(100vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; } }
        input { padding: 12px; border-radius: 12px; border: 1px solid #ff9a9e; width: 85%; margin-top: 20px; outline: none; }
        button { margin-top: 15px; padding: 10px 25px; background: #ff4b2b; color: white; border: none; border-radius: 20px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        #musicStatus { position: fixed; bottom: 20px; left: 20px; background: rgba(255,255,255,0.7); padding: 5px 15px; border-radius: 20px; font-size: 14px; color: #ff4b2b; }
    </style>
</head>
<body>
    <audio id="bgMusic" loop preload="auto">
        <source src="https://cdn.pixabay.com/audio/2022/05/27/audio_1808f3030e.mp3" type="audio/mpeg">
    </audio>

    <div id="musicStatus">Musiqa uchun ekranga bosing 🎵</div>

    <div class="card">
        <div class="heart-main">❤️</div>
        <p style="color: #ff4b2b; font-size: 22px; font-weight: bold;">{{.Message}}</p>
        <form action="/reply" method="POST">
            <input type="text" name="reply_text" placeholder="Javobingizni yozing..." required>
            <br>
            <button type="submit">Yuborish</button>
        </form>
    </div>

    <script>
        const music = document.getElementById('bgMusic');
        const status = document.getElementById('musicStatus');

        // Saytga birinchi marta bosganda musiqa chalinsin
        document.body.addEventListener('click', function() {
            if (music.paused) {
                music.play().then(() => {
                    status.innerHTML = "Musiqa yangramoqda 🔊";
                }).catch(e => console.log("Xato:", e));
            }
        }, { once: false });

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 2 + 3 + 's';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }
        setInterval(createHeart, 400);
    </script>
</body>
</html>
